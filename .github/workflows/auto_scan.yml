- name: Commit and Push memory changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 防呆機制：若記憶檔案不存在，自動建立一個空的
        if [ ! -f stock_memory.csv ]; then
          echo "stock_id,last_run,total_count" > stock_memory.csv
        fi
        
        # 檢查是否有檔案變動需要提交
        if git status --porcelain | grep -qE "stock_memory.csv|scan_cache.csv"; then
          git add stock_memory.csv scan_cache.csv
          git commit -m "🔄 自動更新盤中雷達記憶庫與快取數據 [Skip CI]"
          
          # 💡 【核心修正】：Push 前先用 rebase 融合遠端最新變動，並在失敗時最多重試 3 次
          for i in {1..3}; do
            echo "嘗試與遠端同步並推送數據 (第 $i 次)..."
            git pull --rebase origin main
            if git push origin main; then
              echo "✅ 數據成功推送至 GitHub 倉庫！"
              break
            fi
            echo "⚠️ 推送失敗，等待 5 秒後重試..."
            sleep 5
          done
        else
          echo "✨ 記憶庫與快取數據無任何變動，跳過推送。"
        fi