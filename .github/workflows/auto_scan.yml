- name: Commit and Push memory changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 防呆機制：若記憶檔案不存在，自動建立一個空的
        if [ ! -f stock_memory.csv ]; then
          echo "stock_id,last_run,total_count" > stock_memory.csv
        fi
        
        # 檢查是否有檔案變動需要提交
        if git status --porcelain | grep -qE "stock_memory.csv|scan_cache.csv"; then
          git add stock_memory.csv scan_cache.csv
          git commit -m "🔄 自動更新盤中雷達記憶庫與快取數據 [Skip CI]"
          
          # 💡 【終極大絕招】：不用理會遠端衝突，直接使用 -f (force) 強制覆蓋雲端數據
          # 這樣不管排程塞車多嚴重，虛擬主機算完的最新成果一定能順利寫入 GitHub！
          echo "🚀 正在強制同步最新雷達數據至 GitHub..."
          git push -f origin main
          echo "✅ 數據已暴力同步成功！"
        else
          echo "✨ 記憶庫與快取數據無任何變動，跳過推送。"
        fi