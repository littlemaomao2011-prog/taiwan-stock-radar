name: Taiwan Stock Auto Scanner

on:
  workflow_dispatch: # 支援手動按鈕觸發
  schedule:
    # 💡 5分鐘執行一次，對齊台灣時間週一至週五 09:00 ~ 13:40
    # 換算成 UTC 時間為 01:00 ~ 05:40 
    - cron: '*/5 1-5 * * 1-5'

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 🚀 已修正：將原本的無效 input 改成嚴格指定的單引號字串

    - name: Cache Pip Packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests lxml jinja2 pytz

    - name: Execute Stock Radar Scanner
      run: |
        python scanner_rising_point.py

    - name: Git Auto Commit and Push Memory
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        if [ -f stock_memory.csv ]; then
          git add stock_memory.csv
          git commit -m "Auto update stock memory database [skip ci]" --allow-empty
          git push origin main || echo "No changes to push or conflict"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}