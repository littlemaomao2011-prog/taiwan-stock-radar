name: 🛰️ 台灣個股多頭雷達自動排程

on:
  # ⏱️ 定時排程：每 30 分鐘執行一次
  # (GitHub Actions 的 cron 使用 UTC 時間，台股開盤時間為台灣時間 09:00 - 13:30，換算 UTC 為 01:00 - 05:30)
  schedule:
    - cron: '*/30 1-5 * * 1-5'
  
  # 🚀 手動觸發：讓你可以隨時在 GitHub 網頁上點擊 "Run workflow" 測試
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    # Step 1: 檢查並拉取專案程式碼
    - name: 檢查程式碼 (Checkout)
      uses: actions/checkout@v3

    # Step 2: 設定 Python 環境
    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip' # 開啟快取加速後續執行

    # Step 3: 🔥 核心關鍵！下載、編譯並安裝 TA-Lib 的 C++ 底層庫，解決 ModuleNotFoundError
    - name: 下載與編譯 TA-Lib 底層 C++ 庫
      run: |
        wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
        tar -xzf ta-lib-0.4.0-src.tar.gz
        cd ta-lib/
        ./configure --prefix=/usr
        make
        sudo make install
        cd ..
        rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

    # Step 4: 安裝 Python 相關套件（包含 TA-Lib 封裝庫、yfinance 等）
    - name: 安裝 Python 套件依赖
      run: |
        python -m pip install --upgrade pip
        pip install TA-Lib
        pip install yfinance requests pandas

    # Step 5: 🚀 執行你的雷達主程式
    - name: 執行多頭雷達程式 (scanner_rising_point.py)
      env:
        # 讀取你在 GitHub Repository Secrets 裡設定的 Telegram 憑證
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scanner_rising_point.py
