name: Taiwan Stock Radar

on:
  schedule:
    - cron: '35 1,6 * * 1-5' # 舉例：盤中與盤後定時執行
  workflow_dispatch: # 允許手動觸發

jobs:
  run-radar:
    runs-on: ubuntu-latest
    
    # ✨ 關鍵就是補上這兩行，允許這個工作流有權限 Push 程式碼與檔案回儲存庫
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scanner
      run: python scanner_rising_point.py

    # 你的 Git Commit & Push 步驟
    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "github-actions[bot]"
        git add scan_cache.csv stock_memory.csv || true
        git commit -m "🔄 自動更新快取與連霸記憶庫 [$(date '+%Y-%m-%d %H:%M:%S')]" -a || echo "No changes to commit"
        git push origin main
