name: Taiwan Stock 666 Scanner

on:
  schedule:
    - cron: '5 1 * * 1-5'   # 09:05
    - cron: '30 1 * * 1-5'  # 09:30
    - cron: '50 1 * * 1-5'  # 09:50
    - cron: '15 2 * * 1-5'  # 10:15
    - cron: '35 2 * * 1-5'  # 10:35
    - cron: '0 3 * * 1-5'   # 11:00
    - cron: '30 3 * * 1-5'  # 11:30
    - cron: '0 4 * * 1-5'   # 12:00
    - cron: '30 4 * * 1-5'  # 12:30
    - cron: '0 5 * * 1-5'   # 13:00
    - cron: '20 5 * * 1-5'  # 13:20
  workflow_dispatch:        

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write       

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests lxml openpyxl

    - name: Run scanner
      env:
        PYTHONUNBUFFERED: "1"
      run: python scanner_rising_point.py

    - name: Commit and Push memory and cache changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 🧠 將記憶庫與快取庫同步加入 Git 備份
        if [ -f stock_memory.csv ]; then git add stock_memory.csv; fi
        if [ -f scan_cache.csv ]; then git add scan_cache.csv; fi
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 自動更新盤中雷達記憶庫與快取數據 [Skip CI]" && git push)