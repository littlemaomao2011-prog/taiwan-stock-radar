name: Run Stock Scanner

on:
  schedule:
    # 這裡放你的定時排程設定
    - cron: '30 1 * * 1-5' 
  workflow_dispatch: # 允許手動觸發

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    # 1. 簽出程式碼 (升級至 v4)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 設定 Python 環境 (升級至 v5，並移除錯誤的 python-modules)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 選填：加速後續執行

    # 3. 正確安裝套件的步驟
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pandas-ta yfinance requests

    # 4. 執行你的台股雷達程式
    - name: Run Scanner Script
      run: python your_script_name.py # 記得換成你的檔名