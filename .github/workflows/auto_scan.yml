name: 台股 666 鐵血起漲點排程掃描

on:
  schedule:
    # 台股盤中 9:30, 10:30, 11:30, 12:30, 13:30, 14:30 (每逢半點觸發)
    # 轉換為國際標準時間 UTC 為：01:30, 02:30, 03:30, 04:30, 05:30, 06:30
    - cron: '30 1-6 * * 1-5'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 複製專案代碼
      uses: actions/checkout@v4

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 安裝必要的技術指標套件
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas pandas-ta yfinance

    - name: 🚀 鐵血執行起漲雷達
      env:
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python scanner_rising_point.py