name: Taiwan Stock 666 Scanner

on:
  schedule:
    # 台灣週一至週五 09:30, 10:30, 11:30, 12:30, 13:30, 14:30
    - cron: '30 1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: # 手動執行按鈕

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 💡 終極相容相依套件安裝：鎖定相容版本，防止 GitHub 環境底層閃退
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas==2.2.2 pandas-ta==0.3.14b0 yfinance requests lxml

    - name: Run Stock Scanner Script
      run: python scanner_rising_point.py