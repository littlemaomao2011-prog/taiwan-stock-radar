name: Taiwan Stock 666 Scanner

on:
  workflow_dispatch: # 保持手動觸發功能
  schedule:
    # 🟢 故意錯開整點與半點，改成每小時的 05 分與 35 分觸發（避開全世界塞車尖峰）
    # 台灣時間 09:05 到 13:05 (對應 UTC 01:05 ~ 05:05)
    - cron: '5,35 1-5 * * 1-5'
    
    # 🟢 台灣時間 13:35 的最後一筆收盤加碼通報 (對應 UTC 05:35)
    - cron: '35 5 * * 1-5'

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests lxml openpyxl

    - name: Run Stock Scanner Radar
      run: |
        python scanner_rising_point.py