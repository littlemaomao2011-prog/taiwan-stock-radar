name: Taiwan Stock 666 Scanner

on:
  schedule:
    # 💡 完美對齊台股盤中時間（轉換為 UTC 時間）
    - cron: '5 1 * * 1-5'   # 09:05
    - cron: '30 1 * * 1-5'  # 09:30
    - cron: '50 1 * * 1-5'  # 09:50
    - cron: '15 2 * * 1-5'  # 10:15
    - cron: '35 2 * * 1-5'  # 10:35
    - cron: '0 3 * * 1-5'   # 11:00
    - cron: '30 3 * * 1-5'  # 11:30
    - cron: '0 4 * * 1-5'   # 12:00
    - cron: '30 4 * * 1-5'  # 12:30
    - cron: '0 5 * * 1-5'   # 13:00
    - cron: '20 5 * * 1-5'  # 13:20
  workflow_dispatch:        # 保留手動點擊執行的按鈕

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # ⚡ 2026核心關鍵：必須明確授權雲端寫入權限，否則會噴 Exit code 1

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true # ⚡ 保持認證狀態，允許回傳更新記憶檔

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'        # 自動快取，避免重複下載拖慢速度

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests lxml openpyxl

    - name: Run scanner
      env:
        PYTHONUNBUFFERED: "1" # 確保所有的 print 紀錄能即時完全印出，方便 Debug
      run: python scanner_rising_point.py

    - name: Commit and Push memory changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 防呆機制：若記憶檔案不存在，自動建立一個空的，避免後續指令因找不到檔案而 Exit code 1
        if [ ! -f stock_memory.csv ]; then
          echo "stock_id,last_run,total_count" > stock_memory.csv
        fi
        
        git add stock_memory.csv
        # 檢查是否有真正的檔案變動，如果有才進行 commit & push，完全避開無意義的報錯
        if ! git diff --quiet --staged; then
          git commit -m "💾 自動更新盤中記憶數據 [skip ci]"
          git push
        else
          echo "ℹ️ 數據無變動，跳過推送。"
        fi