steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy requests lxml openpyxl

    # 💡 核心變更 1：從 GitHub Artifacts 下載「上一輪」存下來的快取與記憶檔案
    - name: Download prior scan cache
      uses: actions/download-artifact@v4
      with:
        name: radar-memory-cache
        path: .
      continue-on-error: true # 第一次執行如果沒有快取，自動忽略不報錯

    # 執行您的選股雷達核心
    - name: Run scanner
      env:
        PYTHONUNBUFFERED: "1"
      run: python scanner_rising_point.py

    # 💡 核心變更 2：執行完畢，不推 git，直接把最新檔案打包上傳成 Artifact
    # GitHub 會自動用最新的一期覆蓋它，盤中排程再密也絕對不會相撞！
    - name: Upload latest scan cache
      uses: actions/upload-artifact@v4
      with:
        name: radar-memory-cache
        path: |
          stock_memory.csv
          scan_cache.csv
        retention-days: 2 # 暫存 2 天即可，省空間又高效率