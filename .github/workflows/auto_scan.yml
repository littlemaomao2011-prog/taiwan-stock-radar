name: Taiwan Stock 666 Scanner

on:
  schedule:
    - cron: '30 1,2,3,4,5,6 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests pandas-ta lxml
        
    - name: Run Stock Scanner Script
      run: python scanner_rising_point.py