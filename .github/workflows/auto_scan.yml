name: Taiwan Stock 666 Scanner

on:
  schedule:
    # 台灣週一至週五 09:30, 10:30, 11:30, 12:30, 13:30, 14:30
    - cron: '30 1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: # 手動執行按鈕

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    # 🛡️ 升級最新版 Checkout，完美對齊雲端環境
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 🛡️ 升級最新版 Python 部署器
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 自動快取 pip 套件，防止雲端連線逾時中斷
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 補齊 lxml 與 pandas-ta 核心指標套件
        pip install pandas yfinance requests pandas-ta lxml
        
    - name: Run Stock Scanner Script
      run: python scanner_rising_point.py