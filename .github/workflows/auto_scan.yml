- name: Commit and Push memory changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 1. 先把 Python 跑出來的最新數據改名備份，避免被蓋掉
        [ -f stock_memory.csv ] && mv stock_memory.csv stock_memory_new.csv
        [ -f scan_cache.csv ] && mv scan_cache.csv scan_cache_new.csv
        
        # 2. 強制把遠端 GitHub 的檔案拉回來，讓 Git 軌道絕對保持一致
        git fetch origin main
        git checkout origin/main -- stock_memory.csv scan_cache.csv || true
        
        # 3. 融合新舊數據（如果遠端有就用新的覆蓋，如果遠端沒有就建立）
        [ -f stock_memory_new.csv ] && mv stock_memory_new.csv stock_memory.csv
        [ -f scan_cache_new.csv ] && mv scan_cache_new.csv scan_cache.csv
        
        # 4. 提交並使用常規的 Push（不帶 -f，保證符合分支保護規則）
        if git status --porcelain | grep -qE "stock_memory.csv|scan_cache.csv"; then
          git add stock_memory.csv scan_cache.csv
          git commit -m "🔄 自動更新盤中雷達記憶庫與快取數據 [Skip CI]"
          
          # 循環重試常規 Push
          for i in {1..5}; do
            echo "正在安全同步雷達數據 (第 $i 次)..."
            if git push origin main; then
              echo "✅ 數據已成功安全寫入 GitHub！"
              exit 0
            fi
            echo "⚠️ 同步撞車，等待 3 秒後重試..."
            sleep 3
            git fetch origin main
            git merge origin/main -m "Merge remote" || true
          done
        else
          echo "✨ 數據無變動，跳過推送。"
        fi