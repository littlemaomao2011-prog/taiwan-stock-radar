name: Taiwan Stock Radar System

on:
  schedule:
    # 💡 避開整點與半點的全球流量尖峰，改成冷門的奇數分鐘，大幅縮短排隊時間！
    # 1. 盤前熱身防線 (台北時間 08:42 / 國際時間 00:42)
    - cron: '42 0 * * 1-5'
    
    # 2. 盤中特攻主線 (台北時間 09:22 / 國際時間 01:22) - 提早抓出早上衝出來的飆股
    - cron: '22 1 * * 1-5'
    
    # 3. 盤中保險防線 (台北時間 10:13 / 國際時間 02:13) - 萬一 09:22 嚴重延遲，這條會補發
    - cron: '13 2 * * 1-5'
    
    # 4. 盤後選股主線 (台北時間 14:42 / 國際時間 06:42)
    - cron: '42 6 * * 1-5'
    
  workflow_dispatch: # 保持手動執行按鈕

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install C Library TA-Lib
        run: |
          wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr
          make
          sudo make install
          cd ..
          rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install TA-Lib numpy==1.23.5 pandas yfinance requests lxml beautifulsoup4 html5lib

      - name: Run Stock Radar Scanner
        run: python scanner_rising_point.py

      - name: Commit and Push Memory/Cache Data
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add scan_cache.csv stock_memory.csv || true
          git commit -m "🤖 自動同步更新：跨場次快取與連霸記憶庫 [skip ci]" || true
          git push origin main || true
