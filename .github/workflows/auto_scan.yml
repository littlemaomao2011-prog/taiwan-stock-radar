name: Taiwan Stock 666 Scanner

on:
  schedule:
    # 台灣時間週一至週五盤中每 20-30 分鐘自動執行
    - cron: '05 1' # 09:05
    - cron: '30 1' # 09:30
    - cron: '50 1' # 09:50
    - cron: '15 2' # 10:15
    - cron: '35 2' # 10:35
    - cron: '00 3' # 11:00
    - cron: '30 3' # 11:30
    - cron: '00 4' # 12:00
    - cron: '30 4' # 12:30
    - cron: '00 5' # 13:00
    - cron: '20 5' # 13:20
  workflow_dispatch: # 保持手動測試按鈕

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy yfinance lxml html5lib beautifulsoup4

    - name: Run Stock Scanner Radar
      run: python scanner_rising_point.py

    - name: Save Run Memory to Repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        if [ -f stock_memory.csv ]; then
          git add stock_memory.csv
          git commit -m "💾 自動記分板：更新今日霸榜計數器 [skip ci]" || echo "沒有新改動"
          git push origin main || echo "推回失敗"
        fi