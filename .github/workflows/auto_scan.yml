name: Taiwan Stock 666 Scanner

on:
  schedule:
    # 這裡的排程採用 UTC 時間 (台灣時間減去 8 小時)
    # 台灣週一至週五 09:30, 10:30, 11:30, 12:30, 13:30, 14:30
    # 對應 UTC 為 01:30, 02:30, 03:30, 04:30, 05:30, 06:30
    - cron: '30 1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: # 保留這個按鈕，讓你想手動測試時隨時可以點擊執行

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    # 1. 簽出程式碼 (升級到 v4，解決 Node.js 20 警告)
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 設定 Python 環境 (升級到 v5，並徹底移除錯誤的 python-modules 欄位)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 將你需要的所有第三方套件獨立出來安裝
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pandas-ta yfinance requests

    # 4. 執行你的台股主程式
    # ⚠️ 請確保你的 Python 檔案名稱叫 main.py，如果是別的名字（例如 stock.py），請把下面 main.py 改掉
    - name: Run Stock Scanner Script
      run: python main.py