name: 台股 60分線五合一雷達排程

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1-5'   # 台灣時間 10:00
    - cron: '0 3 * * 1-5'   # 台灣時間 11:00
    - cron: '0 4 * * 1-5'   # 台灣時間 12:00
    - cron: '0 5 * * 1-5'   # 台灣時間 13:00
    - cron: '0 6 * * 1-5'   # 台灣時間 14:00

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 啟用快取，讓每次執行的環境更穩定

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || pip install yfinance pandas pandas_ta requests

    - name: 執行台股雷達篩選
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # 🌟 在執行前隨機延遲 1~10 秒，打散固定整點的請求，避免被 Yahoo 雲端防火牆阻擋
        sleep $((1 + RANDOM % 10))
        python scanner.py